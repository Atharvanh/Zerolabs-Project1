    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #131313;
            color: #e5e2e1;
        }

        .glass-panel {
            background: rgba(53, 53, 52, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(70, 69, 85, 0.15);
        }

        .ambient-shadow {
            box-shadow: 0 30px 60px rgba(14, 14, 14, 0.08);
        }

        .gradient-text {
            background: linear-gradient(to right, #adc6ff, #005cc6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ghost-border {
            border: 1px solid rgba(70, 69, 85, 0.15);
        }

        /* Staggered entrance */
        .project-card {
            opacity: 0;
            transform: translateY(35px) scale(0.97);
            animation: cardEntrance 0.65s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes cardEntrance {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .project-card:nth-child(1) {
            animation-delay: 0.08s;
        }

        .project-card:nth-child(2) {
            animation-delay: 0.18s;
        }

        .project-card:nth-child(3) {
            animation-delay: 0.28s;
        }

        .project-card:nth-child(4) {
            animation-delay: 0.38s;
        }

        .project-card:nth-child(5) {
            animation-delay: 0.48s;
        }

        .project-card:nth-child(6) {
            animation-delay: 0.58s;
        }

        /* Score orb pulse on hover */
        .score-orb {
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }

        .project-card:hover .score-orb {
            transform: scale(1.18);
            box-shadow: 0 0 18px rgba(78, 222, 163, 0.35);
        }

        /* Gradient border sweep on hover */
        .project-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, transparent 40%, rgba(173, 198, 255, 0.15), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .project-card:hover::after {
            opacity: 1;
        }

        /* Hero card glow sweep */
        .hero-card {
            opacity: 0;
            transform: translateY(20px);
            animation: cardEntrance 0.8s cubic-bezier(0.19, 1, 0.22, 1) 0.02s forwards;
        }
    </style>
